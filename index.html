<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>Carrion Rat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="rat.png" type="image/x-icon">
</head>

<body>

<div id="menuScreen" style="
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Arial;
    z-index: 10;
">
    <h1 style="font-size: 60px; margin-bottom: 50px;"> <img src="rat.png"> RAT GAME</h1>
    
    <button class="menuBtn" onclick="nouvellePartie()">Nouvelle Partie</button>
    <button class="menuBtn" onclick="reprendrePartie()">Reprendre</button>
    <button class="menuBtn" onclick="choixNiveau()">Choix du Niveau</button>
</div>

<div id="levelScreen" style="
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #1a1a2e;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Arial;
    z-index: 10;
">
    <h2 style="font-size: 40px; margin-bottom: 40px;">Choisir le niveau</h2>
    <button class="menuBtn" onclick="lancerNiveau(1)">Niveau 1</button>
    <button class="menuBtn" onclick="lancerNiveau(2)">Niveau 2</button>
    <button class="menuBtn" onclick="lancerNiveau(3)">Niveau 3</button>
    <button class="menuBtn" onclick="retourMenu()" 
        style="background:#555; margin-top:20px;">← Retour</button>
</div>

    <canvas id="gameCanvas"></canvas>
    <div id="timer"></div>
    <script src="donnees.js"></script>
    <script src="Rat.js"></script>
    <script src="Obstacle.js"></script>
    <script src="Level.js"></script>
    <script src="game.js"></script>
    <script src="timer.js"></script>
</body>
</html>
