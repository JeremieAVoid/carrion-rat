<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Butcherman&display=swap" rel="stylesheet">
    <title>Carrion Rat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/rat.png" type="image/x-icon">
</head>

<body>

<div id="menuScreen" style="
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('images/accueil_skull.png') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: Arial;
    z-index: 10;
">
<div style="position: relative; width: 800px; margin-bottom: 50px;">
    <img src="images/titre_jeu.png" alt="Carrion Rat" style="width: 800px;">
    <canvas id="ratCanvas" style="
    position: absolute;
    bottom: 0; left: 0;
    width: 800px;
    height: 150px;
    pointer-events: none;
    "></canvas>
</div>
    
<button class="menuBtn" onclick="nouvellePartie()">
    <img src="images/new_game.png" alt="Nouvelle Partie">
</button>
<button class="menuBtn" onclick="reprendrePartie()">
    <img src="images/reprendre.png" alt="Reprendre">
</button>
<button class="menuBtn" onclick="choixNiveau()">
    <img src="images/level_choice.png" alt="Choix du Niveau">
</button>
</div>
    <script src="donnees.js"></script>
    <script src="fonctions_menu.js"></script>
</body>
</html>
